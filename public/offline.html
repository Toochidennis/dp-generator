<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#F8A018" />
    <title>Offline | Kids Coding Bootcamp</title>
    <style>
      :root {
        color: #182133;
        background: #f9f4e8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 460px;
        border: 2px solid #182133;
        border-radius: 18px;
        background: #fff;
        box-shadow: 8px 8px 0 #182133;
        padding: 32px;
      }

      img {
        height: 42px;
        width: auto;
      }

      h1 {
        margin: 24px 0 12px;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.98;
      }

      p {
        margin: 0;
        color: rgba(24, 33, 51, 0.72);
        font-size: 1rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        border: 2px solid #182133;
        border-radius: 12px;
        background: #f8a018;
        color: #182133;
        padding: 12px 16px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/digital-dreams-logo.png" alt="Digital Dreams" />
      <h1>You are offline.</h1>
      <p>
        The bootcamp page is available once it has loaded before, but this visit needs a connection.
        Reconnect and try again.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
